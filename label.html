<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>พิมพ์ QR Sticker</title>
<style>
*{box-sizing:border-box}
:root{--paper-w:25mm;--paper-h:20mm}
html,body{margin:0;padding:0;width:var(--paper-w);background:#eef2f3;font-family:Tahoma,"Leelawadee UI","Noto Sans Thai",Arial,sans-serif;color:#000;-webkit-print-color-adjust:exact;print-color-adjust:exact}
#printPages{width:var(--paper-w);margin:0;padding:0;line-height:0}
.label-canvas{display:block;width:var(--paper-w);height:var(--paper-h);margin:0;padding:0;background:#fff;overflow:hidden;break-inside:avoid;page-break-inside:avoid;break-after:page;page-break-after:always}
.label-canvas:last-child{break-after:auto;page-break-after:auto}
.screen-status{position:fixed;left:29mm;top:5mm;width:370px;padding:14px 16px;border-radius:12px;background:#fff;color:#087b6f;box-shadow:0 8px 28px rgba(0,0,0,.16);font-size:13px;font-weight:700;line-height:1.45}
.screen-status small{display:block;margin-top:4px;color:#667a76;font-weight:500}
@page{size:25mm 20mm;margin:0}
@media print{
  html,body{width:var(--paper-w)!important;height:auto!important;min-height:0!important;margin:0!important;padding:0!important;overflow:visible!important;background:#fff!important;line-height:0!important}
  #printPages{width:var(--paper-w)!important;margin:0!important;padding:0!important;line-height:0!important}
  .label-canvas{display:block!important;width:var(--paper-w)!important;height:var(--paper-h)!important;margin:0!important;padding:0!important}
  .screen-status{display:none!important}
}
</style>
</head>
<body>
<div id="printPages"></div>
<div class="screen-status" id="screenStatus">กำลังสร้างสติ๊กเกอร์แบบภาพคงที่…</div>
<script src="assets/qr-lite.js?v=1.4.19"></script>
<script>
'use strict';
const p=new URLSearchParams(location.search);
const safe=(v,f='-')=>v&&v!=='null'?v:f;
const code=safe(p.get('code'));
const lot=safe(p.get('lot'));
const key=safe(p.get('key'),`${code}-${lot}`);
const qrText=safe(p.get('qr'),key);
const name=safe(p.get('name'));
const exp=safe(p.get('exp'),'ไม่ระบุ');
const profile=p.get('profile')==='zebra'?'zebra':'tsc';
const copies=Math.max(1,Math.min(100,Math.round(Number(p.get('copies'))||1)));
const statusEl=document.getElementById('screenStatus');
const pages=document.getElementById('printPages');
const PROFILES={
  zebra:{name:'Zebra 420t',dpi:203,width:200,height:160,layout:{x:.062,y:.046,w:.876,h:.708,sepRatio:.60,qrRatio:.285,nameStart:.078,nameMin:.050,codeSize:.038,metaSize:.049,keyStart:.029,keyMin:.021,lineWidth:1}},
  tsc:{name:'TSC 310',dpi:300,width:296,height:236,layout:{x:.034,y:.026,w:.932,h:.748,sepRatio:.60,qrRatio:.302,nameStart:.086,nameMin:.054,codeSize:.041,metaSize:.053,keyStart:.031,keyMin:.022,lineWidth:1}}
};
const PROFILE=PROFILES[profile]||PROFILES.tsc;
const profileName=PROFILE.name;

function makeCanvas(){
  const canvas=document.createElement('canvas');
  canvas.className='label-canvas';
  canvas.width=PROFILE.width;
  canvas.height=PROFILE.height;
  canvas.style.width='var(--paper-w)';
  canvas.style.height='var(--paper-h)';
  canvas.style.imageRendering='pixelated';
  canvas.setAttribute('aria-label',`สติ๊กเกอร์ ${name} Lot ${lot}`);
  return canvas;
}

function pxW(v){return Math.max(0,Math.round(PROFILE.width*v));}
function pxH(v){return Math.max(0,Math.round(PROFILE.height*v));}
function setFont(ctx,weight,size){ctx.font=`${weight} ${Math.max(8,Math.round(size))}px Tahoma, \"Leelawadee UI\", Arial, sans-serif`;}
function fitSingleLine(ctx,text,maxWidth,start,min,weight=900){
  let size=start;
  while(size>min){setFont(ctx,weight,size);if(ctx.measureText(text).width<=maxWidth)return size;size-=1;}
  return min;
}
function splitToken(ctx,token,maxWidth){
  const chars=Array.from(token),parts=[];let line='';
  for(const ch of chars){const test=line+ch;if(line&&ctx.measureText(test).width>maxWidth){parts.push(line);line=ch;}else line=test;}
  if(line)parts.push(line);return parts;
}
function wrapText(ctx,text,maxWidth){
  const words=String(text||'-').trim().split(/\s+/).filter(Boolean);
  const lines=[];
  for(const word of words){
    const pieces=ctx.measureText(word).width>maxWidth?splitToken(ctx,word,maxWidth):[word];
    for(const piece of pieces){
      const current=lines[lines.length-1]||'';
      const test=current?`${current} ${piece}`:piece;
      if(current&&ctx.measureText(test).width>maxWidth)lines.push(piece);
      else if(lines.length)lines[lines.length-1]=test;
      else lines.push(test);
    }
  }
  return lines;
}
function fitName(ctx,text,maxWidth,maxHeight,start,min,maxLines){
  let size=start,lines=[];
  const absoluteMin=Math.max(8,min-4);
  while(size>=absoluteMin){
    setFont(ctx,900,size);
    lines=wrapText(ctx,text,maxWidth);
    const allowedLines=size>=min?maxLines:maxLines+1;
    const lineHeight=Math.max(size*1.02,size+1);
    const widest=Math.max(0,...lines.map(x=>ctx.measureText(x).width));
    if(lines.length&&lines.length<=allowedLines&&widest<=maxWidth+1&&lines.length*lineHeight<=maxHeight+1)return {size,lines,lineHeight};
    size-=1;
  }
  setFont(ctx,900,absoluteMin);
  lines=wrapText(ctx,text,maxWidth);
  return {size:absoluteMin,lines,lineHeight:Math.max(absoluteMin*1.02,absoluteMin+1)};
}
function drawText(ctx,text,x,y,weight,size,align='left'){
  setFont(ctx,weight,size);ctx.textAlign=align;ctx.textBaseline='alphabetic';ctx.fillStyle='#000';ctx.fillText(text,x,y);
}
function renderQrImage(targetSize, quiet=4){
  const modules=window.CNMIQRCode.matrix(qrText,'L');
  const count=modules.length;
  const total=count+quiet*2;
  const modulePx=Math.max(1,Math.floor(targetSize/total));
  const drawSize=modulePx*total;
  const canvas=document.createElement('canvas');
  canvas.width=drawSize; canvas.height=drawSize;
  const ctx=canvas.getContext('2d',{alpha:false});
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,drawSize,drawSize);
  ctx.fillStyle='#000';
  for(let r=0;r<count;r++){
    for(let c=0;c<count;c++){
      if(modules[r][c]) ctx.fillRect((c+quiet)*modulePx,(r+quiet)*modulePx,modulePx,modulePx);
    }
  }
  return {canvas,size:drawSize,modulePx,total};
}
function profileLayout(){
  const L=PROFILE.layout;
  return {
    x:pxW(L.x), y:pxH(L.y), w:pxW(L.w), h:pxH(L.h), sepRatio:L.sepRatio,
    qrSize:pxW(L.qrRatio), nameStart:pxH(L.nameStart), nameMin:pxH(L.nameMin),
    codeSize:pxH(L.codeSize), metaSize:pxH(L.metaSize), keyStart:pxH(L.keyStart),
    keyMin:pxH(L.keyMin), lineWidth:Math.max(1,Math.round(Math.min(PROFILE.width,PROFILE.height)*0.006))
  };
}
async function drawLabel(canvas,qrImg){
  const ctx=canvas.getContext('2d',{alpha:false});
  ctx.save();ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.restore();
  const L=profileLayout();
  const sepX=Math.round(L.x+L.w*L.sepRatio);
  const leftPad=Math.max(4,Math.round(canvas.width*0.012));
  const leftX=L.x+leftPad;
  const leftW=sepX-leftX-leftPad;
  const rightX=sepX+Math.max(3,Math.round(canvas.width*0.016));
  const rightW=L.x+L.w-rightX-2;
  const codeH=L.codeSize*1.12, metaH=L.metaSize*1.08;
  const fixedHeight=codeH+metaH*2+8;
  const nameMaxH=Math.max(12,L.h-fixedHeight);
  const fitted=fitName(ctx,name,leftW,nameMaxH,L.nameStart,L.nameMin,3);
  const totalH=fitted.lines.length*fitted.lineHeight+codeH+metaH*2+6;
  let y=L.y+Math.max(0,(L.h-totalH)/2)+fitted.size;
  fitted.lines.forEach(line=>{drawText(ctx,line,leftX,y,900,fitted.size);y+=fitted.lineHeight;});
  y+=1;
  drawText(ctx,`รหัส ${code}`,leftX,y,800,L.codeSize);y+=codeH;
  drawText(ctx,`Lot ${lot}`,leftX,y,900,L.metaSize);y+=metaH;
  drawText(ctx,`EXP ${exp}`,leftX,y,900,L.metaSize);

  ctx.save();ctx.strokeStyle='#111';ctx.lineWidth=L.lineWidth;ctx.beginPath();ctx.moveTo(sepX+0.5,L.y);ctx.lineTo(sepX+0.5,L.y+L.h);ctx.stroke();ctx.restore();

  const keyAreaH=Math.max(11,pxH(0.06));
  const qrDraw=Math.min(L.qrSize,rightW-2,L.h-keyAreaH-4);
  const qrX=Math.round(rightX+(rightW-qrImg.size)/2);
  const qrY=Math.round(L.y+Math.max(0,(L.h-qrImg.size-keyAreaH-2)/2));
  ctx.save();ctx.imageSmoothingEnabled=false;ctx.drawImage(qrImg.canvas,qrX,qrY,qrImg.size,qrImg.size);ctx.restore();
  const keySize=fitSingleLine(ctx,key,rightW-2,L.keyStart,L.keyMin,900);
  drawText(ctx,key,rightX+rightW/2,Math.min(canvas.height-2,qrY+qrImg.size+keySize+1),900,keySize,'center');
}
async function prepare(){
  if(document.fonts&&document.fonts.ready){try{await document.fonts.ready;}catch(_){}}
  const qrImg=renderQrImage(profileLayout().qrSize,4);
  const canvases=Array.from({length:copies},makeCanvas);
  canvases.forEach(c=>pages.appendChild(c));
  for(const canvas of canvases)await drawLabel(canvas,qrImg);
  await new Promise(resolve=>requestAnimationFrame(()=>requestAnimationFrame(resolve)));
}
async function startPrint(){
  try{
    await prepare();
    statusEl.innerHTML=`กำลังเปิดหน้าพิมพ์ ${profileName}…<small>${copies} ดวง · ขนาดกระดาษ 25 × 20 mm · Native ${PROFILE.width} × ${PROFILE.height} dots</small>`;
    await new Promise(resolve=>setTimeout(resolve,180));
    window.focus();window.print();
  }catch(e){statusEl.innerHTML='สร้างสติ๊กเกอร์ไม่สำเร็จ กรุณาปิดหน้านี้แล้วลองใหม่';console.error(e);}
}
window.addEventListener('afterprint',()=>setTimeout(()=>window.close(),180));
window.addEventListener('load',()=>{
  statusEl.innerHTML=`โปรไฟล์ ${profileName}<small>เรนเดอร์ตามความละเอียดหัวพิมพ์จริง เพื่อลด QR เป็นประและสแกนง่ายขึ้น</small>`;
  if(p.get('auto')==='1')startPrint();else prepare();
},{once:true});
setTimeout(()=>{if(p.get('auto')==='1'&&!document.hidden)statusEl.innerHTML=`หากหน้าพิมพ์ยังไม่เปิด กรุณากด Ctrl + P<small>เลือก ${profileName} และ Scale 100%</small>`;},6000);
</script>
</body>
</html>
