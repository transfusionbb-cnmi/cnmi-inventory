<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>พิมพ์ QR Sticker</title>
<style>
@page{size:25mm 20mm;margin:0}
*{box-sizing:border-box}
html,body{width:25mm;height:20mm;margin:0;padding:0;background:#fff}
body{font-family:Tahoma,"Noto Sans Thai",Arial,sans-serif;color:#000;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.label{width:25mm;height:20mm;padding:1mm;display:grid;grid-template-columns:minmax(0,1fr) 10mm;gap:.5mm;overflow:hidden;background:#fff}
.text{min-width:0;display:flex;flex-direction:column;justify-content:space-between;line-height:1.02;overflow:hidden}
.code{font-size:6.8pt;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.name{font-size:4.9pt;font-weight:800;line-height:1.08;max-height:6.5mm;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow-wrap:anywhere}
.meta{font-size:4.9pt;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qr-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:0;overflow:hidden}
#qr{width:9.2mm;height:9.2mm;display:grid;place-items:center}
#qr svg{width:100%;height:100%;display:block}
.key{font-size:3.4pt;font-weight:900;line-height:1;text-align:center;max-width:9.5mm;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.3mm}
.fallback{position:fixed;left:29mm;top:4mm;width:230px;padding:14px;border-radius:12px;background:#fff;box-shadow:0 8px 28px rgba(0,0,0,.16);font-family:Arial,sans-serif}
.fallback button{width:100%;padding:11px 14px;border:0;border-radius:9px;background:#087b6f;color:#fff;font-weight:700;cursor:pointer}
.fallback p{font-size:12px;color:#555;line-height:1.45;margin:10px 0 0}
@media print{.fallback{display:none!important}}
</style>
</head>
<body>
<div class="label">
  <div class="text">
    <div class="code" id="code"></div>
    <div class="name" id="name"></div>
    <div class="meta" id="lot"></div>
    <div class="meta" id="exp"></div>
  </div>
  <div class="qr-wrap"><div id="qr"></div><div class="key" id="key"></div></div>
</div>
<div class="fallback"><button id="printAgain">พิมพ์ QR Sticker</button><p>Paper 25 × 20 mm<br>Scale 100% · Margin None<br>ปิด Header/Footer</p></div>
<script src="assets/qr-lite.js?v=1.1.0"></script>
<script>
const p=new URLSearchParams(location.search);
const safe=(v,f='-')=>v&&v!=='null'?v:f;
const code=safe(p.get('code'));
const lot=safe(p.get('lot'));
const key=safe(p.get('key'),`${code}-${lot}`);
const qrText=safe(p.get('qr'),key);
document.getElementById('code').textContent=code;
document.getElementById('name').textContent=safe(p.get('name'));
document.getElementById('lot').textContent='LOT '+lot;
document.getElementById('exp').textContent='EXP '+safe(p.get('exp'),'ไม่ระบุ');
document.getElementById('key').textContent=key;
try{document.getElementById('qr').innerHTML=window.CNMIQRCode.svg(qrText,{level:'L',margin:2});}catch(e){document.getElementById('qr').textContent='QR';}
document.getElementById('printAgain').addEventListener('click',()=>window.print());
window.addEventListener('afterprint',()=>setTimeout(()=>window.close(),150));
if(p.get('auto')==='1')setTimeout(()=>{window.focus();window.print();},450);
</script>
</body>
</html>
