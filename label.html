<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>พิมพ์ QR Sticker</title>
<style>
*{box-sizing:border-box}
:root{--paper-w:25mm;--paper-h:20mm;--label-h:19.72mm}
html,body{margin:0;padding:0;width:var(--paper-w);background:#eef2f3;font-family:Tahoma,"Leelawadee UI","Noto Sans Thai",Arial,sans-serif;color:#000;-webkit-print-color-adjust:exact;print-color-adjust:exact}
#printPages{width:var(--paper-w);margin:0;padding:0;line-height:0}
/*
  ไม่สั่ง page-break หลังแต่ละดวง และลดความสูงลงเล็กน้อย
  เพื่อกัน Chrome/Driver ปัดเศษจนสร้างหน้าว่างคั่นหนึ่งดวง
*/
.label-page{position:relative;display:block;width:var(--paper-w);height:var(--label-h);margin:0;padding:0;background:#fff;overflow:hidden;break-inside:avoid;page-break-inside:avoid}
.label-vector{position:absolute;inset:0;display:block;width:var(--paper-w);height:var(--label-h);margin:0;padding:0;background:#fff;overflow:hidden;text-rendering:geometricPrecision}
.screen-status{position:fixed;left:29mm;top:5mm;width:410px;padding:14px 16px;border-radius:12px;background:#fff;color:#087b6f;box-shadow:0 8px 28px rgba(0,0,0,.16);font-size:13px;font-weight:700;line-height:1.45}
.screen-status small{display:block;margin-top:4px;color:#667a76;font-weight:500}
@page{size:25mm 20mm;margin:0}
@media print{
  html,body{width:var(--paper-w)!important;height:auto!important;min-height:0!important;margin:0!important;padding:0!important;overflow:visible!important;background:#fff!important;line-height:0!important}
  #printPages{width:var(--paper-w)!important;margin:0!important;padding:0!important;line-height:0!important}
  .label-page,.label-vector{display:block!important;width:var(--paper-w)!important;height:var(--label-h)!important;margin:0!important;padding:0!important}
  .screen-status{display:none!important}
}
</style>
</head>
<body>
<div id="printPages"></div>
<div class="screen-status" id="screenStatus">กำลังสร้างสติ๊กเกอร์แบบคมชัด…</div>
<script src="assets/qr-lite.js?v=1.4.37"></script>
<script>
'use strict';
const p=new URLSearchParams(location.search);
const safe=(v,f='-')=>v&&v!=='null'?v:f;
const code=safe(p.get('code'));
const lot=safe(p.get('lot'));
const key=safe(p.get('key'),`${code}-${lot}`);
const qrText=safe(p.get('qr'),key);
const name=safe(p.get('name'));
const exp=safe(p.get('exp'),'ไม่ระบุ');
const profile=p.get('profile')==='zebra'?'zebra':'tsc';
const copies=Math.max(1,Math.min(100,Math.round(Number(p.get('copies'))||1)));
const profileName=profile==='zebra'?'Zebra GC420t':'TSC 310';
const statusEl=document.getElementById('screenStatus');
const pages=document.getElementById('printPages');

/* ขนาดจุดจริงของหัวพิมพ์: Zebra 203 dpi / TSC 300 dpi */
const DEVICE=profile==='zebra'
  ? {dpi:203,w:200,h:160,labelHeight:'19.62mm'}
  : {dpi:300,w:295,h:236,labelHeight:'19.78mm'};
const PX_W=DEVICE.w, PX_H=DEVICE.h;
document.documentElement.style.setProperty('--label-h',DEVICE.labelHeight);

function svgNode(tag,attrs={}){
  const node=document.createElementNS('http://www.w3.org/2000/svg',tag);
  Object.entries(attrs).forEach(([k,v])=>node.setAttribute(k,String(v)));
  return node;
}
function makePage(){
  const page=document.createElement('div');
  page.className='label-page';
  page.setAttribute('aria-label',`สติ๊กเกอร์ ${name} Lot ${lot}`);
  const svg=svgNode('svg',{
    class:'label-vector',viewBox:`0 0 ${PX_W} ${PX_H}`,
    preserveAspectRatio:'none','aria-hidden':'true'
  });
  const defs=svgNode('defs');
  const leftClip=svgNode('clipPath',{id:`left-${Math.random().toString(36).slice(2)}`});
  const leftRect=svgNode('rect');leftClip.appendChild(leftRect);
  const rightClip=svgNode('clipPath',{id:`right-${Math.random().toString(36).slice(2)}`});
  const rightRect=svgNode('rect');rightClip.appendChild(rightRect);
  defs.append(leftClip,rightClip);svg.appendChild(defs);
  page.appendChild(svg);
  return {page,svg,leftClip,leftRect,rightClip,rightRect};
}

const measureCanvas=document.createElement('canvas');
const measureCtx=measureCanvas.getContext('2d');
function setMeasureFont(weight,size){measureCtx.font=`${weight} ${Math.max(1,size)}px Tahoma, "Leelawadee UI", Arial, sans-serif`;}
function fitSingleLine(text,maxWidth,start,min,weight=700){
  let size=start;
  while(size>min){setMeasureFont(weight,size);if(measureCtx.measureText(text).width<=maxWidth)return size;size-=.25;}
  return min;
}
function splitToken(token,maxWidth){
  const chars=Array.from(token),parts=[];let line='';
  for(const ch of chars){const test=line+ch;if(line&&measureCtx.measureText(test).width>maxWidth){parts.push(line);line=ch;}else line=test;}
  if(line)parts.push(line);return parts;
}
function wrapText(text,maxWidth){
  const words=String(text||'-').trim().split(/\s+/).filter(Boolean);
  const lines=[];
  for(const word of words){
    const pieces=measureCtx.measureText(word).width>maxWidth?splitToken(word,maxWidth):[word];
    for(const piece of pieces){
      const current=lines[lines.length-1]||'';
      const test=current?`${current} ${piece}`:piece;
      if(current&&measureCtx.measureText(test).width>maxWidth)lines.push(piece);
      else if(lines.length)lines[lines.length-1]=test;
      else lines.push(test);
    }
  }
  return lines;
}
function fitName(text,maxWidth,maxHeight,start,min,maxLines){
  let size=start,lines=[];
  const absoluteMin=Math.max(profile==='zebra'?9.5:13,min-2);
  while(size>=absoluteMin){
    setMeasureFont(700,size);
    lines=wrapText(text,maxWidth);
    const allowedLines=size>=min?maxLines:maxLines+1;
    const lineHeight=size*1.08;
    const widest=Math.max(0,...lines.map(x=>measureCtx.measureText(x).width));
    if(lines.length&&lines.length<=allowedLines&&widest<=maxWidth+.5&&lines.length*lineHeight<=maxHeight+.5)return {size,lines,lineHeight};
    size-=.25;
  }
  setMeasureFont(700,absoluteMin);
  lines=wrapText(text,maxWidth).slice(0,maxLines+1);
  return {size:absoluteMin,lines,lineHeight:absoluteMin*1.08};
}
function svgRect(parent,x,y,w,h,fill='#000',extra={}){
  const rect=svgNode('rect',{x,y,width:w,height:h,fill,...extra});parent.appendChild(rect);return rect;
}
function svgText(parent,text,x,y,{weight=700,size=12,anchor='start',clipId=''}={}){
  const node=svgNode('text',{
    x,y,fill:'#000','font-family':'Tahoma, Leelawadee UI, Noto Sans Thai, Arial, sans-serif',
    'font-size':size,'font-weight':weight,'text-anchor':anchor,
    'dominant-baseline':'alphabetic'
  });
  if(clipId)node.setAttribute('clip-path',`url(#${clipId})`);
  node.textContent=text;parent.appendChild(node);return node;
}

function profileLayout(){
  if(profile==='zebra'){
    return {
      x:5,y:5,w:190,h:150,sepRatio:.43,
      nameStart:17,nameMin:11.5,codeStart:11,codeMin:8.5,
      metaStart:11.5,metaMin:8.5,
      separator:1,quietModules:3,maxNameLines:4
    };
  }
  return {
    x:6,y:6,w:283,h:224,sepRatio:.43,
    nameStart:25,nameMin:17,codeStart:16,codeMin:12,
    metaStart:17,metaMin:12.5,
    separator:1.5,quietModules:3,maxNameLines:4
  };
}

/*
  ขยาย module ของ QR ให้ใหญ่ขึ้นจริง โดยคงช่องขาวรอบ QR ชัดเจน
  ช่วยให้รอยหมึกที่บวมจากความร้อนไม่เชื่อมช่องดำง่ายเหมือน QR ขนาดเล็ก
*/
function drawQrVector(svg,matrix,boxX,boxY,boxW,boxH,quietModules){
  const count=matrix.length;
  const totalModules=count+quietModules*2;
  const modulePx=Math.max(2,Math.floor(Math.min(boxW,boxH)/totalModules));
  const qrPx=totalModules*modulePx;
  const x=Math.round(boxX+(boxW-qrPx)/2);
  const y=Math.round(boxY+(boxH-qrPx)/2);
  const group=svgNode('g',{'shape-rendering':'crispEdges'});
  svgRect(group,x,y,qrPx,qrPx,'#fff');
  for(let r=0;r<count;r++){
    for(let c=0;c<count;c++){
      if(matrix[r][c])svgRect(group,x+(c+quietModules)*modulePx,y+(r+quietModules)*modulePx,modulePx,modulePx,'#000');
    }
  }
  svg.appendChild(group);
  return {x,y,size:qrPx,modulePx};
}

function drawLabel(item,matrix){
  const {svg,leftClip,leftRect,rightClip,rightRect}=item;
  const L=profileLayout();
  svgRect(svg,0,0,PX_W,PX_H,'#fff');
  const sepX=Math.round(L.x+L.w*L.sepRatio);
  const leftX=L.x+2;
  const leftW=sepX-leftX-4;
  const rightX=sepX+4;
  const rightW=L.x+L.w-rightX-1;
  const leftClipId=leftClip.id,rightClipId=rightClip.id;
  Object.entries({x:leftX,y:L.y,width:leftW,height:L.h}).forEach(([k,v])=>leftRect.setAttribute(k,String(v)));
  Object.entries({x:rightX,y:L.y,width:rightW,height:L.h}).forEach(([k,v])=>rightRect.setAttribute(k,String(v)));

  /* ซ้าย: ชื่อวัสดุ และรหัส BB */
  const codeSize=fitSingleLine(code,leftW,L.codeStart,L.codeMin,700);
  const codeBlockH=codeSize*1.35;
  const nameMaxH=Math.max(profile==='zebra'?82:125,L.h-codeBlockH-6);
  const fitted=fitName(name,leftW,nameMaxH,L.nameStart,L.nameMin,L.maxNameLines);
  const nameH=fitted.lines.length*fitted.lineHeight;
  const totalLeftH=nameH+codeBlockH+(profile==='zebra'?5:8);
  let y=L.y+Math.max(0,(L.h-totalLeftH)/2)+fitted.size;
  fitted.lines.forEach(line=>{
    svgText(svg,line,leftX,y,{weight:700,size:fitted.size,clipId:leftClipId});
    y+=fitted.lineHeight;
  });
  y+=profile==='zebra'?3:5;
  svgText(svg,code,leftX,y+codeSize*.9,{weight:700,size:codeSize,clipId:leftClipId});

  svgRect(svg,sepX,L.y,L.separator,L.h,'#000');

  /* ขวา: QR ด้านบน และ Lot / EXP ตัวใหญ่ด้านล่าง */
  const metaGap=profile==='zebra'?2:3;
  const metaLineH=profile==='zebra'?14.5:21;
  const metaAreaH=metaLineH*2+metaGap+2;
  const qrBoxH=L.h-metaAreaH;
  drawQrVector(svg,matrix,rightX,L.y,rightW,qrBoxH,L.quietModules);

  const lotText=`Lot ${lot}`;
  const expText=`EXP ${exp}`;
  const lotSize=fitSingleLine(lotText,rightW-2,L.metaStart,L.metaMin,700);
  const expSize=fitSingleLine(expText,rightW-2,L.metaStart,L.metaMin,700);
  const metaTop=L.y+qrBoxH+metaGap;
  svgText(svg,lotText,rightX+rightW/2,metaTop+lotSize,{weight:700,size:lotSize,anchor:'middle',clipId:rightClipId});
  svgText(svg,expText,rightX+rightW/2,metaTop+metaLineH+expSize,{weight:700,size:expSize,anchor:'middle',clipId:rightClipId});
}

async function prepare(){
  if(document.fonts&&document.fonts.ready){try{await document.fonts.ready;}catch(_){}}
  const matrix=window.CNMIQRCode.matrix(qrText,'L');
  const items=Array.from({length:copies},makePage);
  items.forEach(item=>pages.appendChild(item.page));
  items.forEach(item=>drawLabel(item,matrix));
  await new Promise(resolve=>requestAnimationFrame(()=>requestAnimationFrame(resolve)));
}

async function startPrint(){
  try{
    await prepare();
    statusEl.innerHTML=`กำลังเปิดหน้าพิมพ์ ${profileName}…<small>${copies} ดวง · QR module ใหญ่ขึ้น · ตัวหนังสือแบบเวกเตอร์ · ไม่เว้นสติ๊กเกอร์เปล่า</small>`;
    await new Promise(resolve=>setTimeout(resolve,180));
    window.focus();window.print();
  }catch(e){statusEl.innerHTML='สร้างสติ๊กเกอร์ไม่สำเร็จ กรุณาปิดหน้านี้แล้วลองใหม่';console.error(e);}
}
window.addEventListener('afterprint',()=>setTimeout(()=>window.close(),180));
window.addEventListener('load',()=>{
  statusEl.innerHTML=`โปรไฟล์ ${profileName}<small>สติ๊กเกอร์มาตรฐาน 25 × 20 mm · QR ขนาดใหญ่ · Lot / EXP ใต้ QR</small>`;
  if(p.get('auto')==='1')startPrint();else prepare();
},{once:true});
setTimeout(()=>{if(p.get('auto')==='1'&&!document.hidden)statusEl.innerHTML=`หากหน้าพิมพ์ยังไม่เปิด กรุณากด Ctrl + P<small>เลือก ${profileName} และ Scale 100% / Actual size</small>`;},6000);
</script>
</body>
</html>
